default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt
        language: system
        pass_filenames: false
        types: [rust]

  - repo: local
    hooks:
      - id: dprint
        name: dprint
        entry: dprint fmt --allow-no-files --
        language: system
        pass_filenames: true
        files: \.(json|md|markdown|toml|ya?ml)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
        args: [--fix=lf]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: rustclippy
        name: rustclippy
        entry: cargo clippy --all-targets --all-features -- -Dclippy::all
        pass_filenames: false
        language: system
        types: [rust]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
